<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fff3de">
<title>Recorre el local en 360° · Casaducho</title>
<link rel="icon" href="favicon-64.png">
<link rel="preload" as="font" type="font/woff2" href="assets/fonts/druk-medium.woff2" crossorigin>
<style>
  @font-face{font-family:'Druk Wide';src:url('assets/fonts/druk-medium.woff2') format('woff2');font-weight:500;font-display:swap}
  @font-face{font-family:'Bricolage';src:url('assets/fonts/bricolage.woff2') format('woff2');font-weight:400 800;font-display:swap}
  :root{--crema:#fff3de;--verde:#006838;--rosa:#ec008c;--tinta:#20140f;
    --druk:'Druk Wide','Bricolage',sans-serif;--sans:-apple-system,'Helvetica Neue',system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--crema);color:var(--tinta);overflow:hidden;-webkit-font-smoothing:antialiased}
  a{text-decoration:none;color:inherit}
  .vf-top{position:fixed;top:0;left:0;right:0;z-index:20;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(255,243,222,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(32,20,15,.07)}
  .vf-back{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:.85rem}
  .vf-back img{height:19px}
  .vf-ttl{font-family:var(--druk);font-weight:500;font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;color:var(--verde)}
  .vf-stage{position:fixed;inset:52px 0 0 0;background:#0b0b0b}
  .vf-360{display:block;width:100%;height:100%;border:0}
  .vf-reserve{position:fixed;left:50%;transform:translateX(-50%);bottom:max(20px,calc(env(safe-area-inset-bottom) + 16px));z-index:25;
    display:inline-flex;align-items:center;gap:9px;background:var(--rosa);color:#fff;border-radius:999px;
    padding:15px 26px;font-family:var(--druk);font-weight:500;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;
    box-shadow:0 10px 30px rgba(236,0,140,.42),0 2px 8px rgba(0,0,0,.25);transition:transform .16s}
  .vf-reserve:hover{transform:translateX(-50%) translateY(-2px)}
  .vf-reserve:active{transform:translateX(-50%) scale(.97)}
  .vf-reserve svg{width:15px;height:15px}
</style>
</head>
<body>
  <header class="vf-top">
    <a class="vf-back" href="index.html"><span style="opacity:.7">&#8592;</span><img src="assets/img/logos/casaducho.webp" alt="Casaducho"></a>
    <span class="vf-ttl">El local en 360&deg;</span>
    <a class="vf-back" href="index.html#reservar" style="color:var(--rosa);font-weight:700">Reservar</a>
  </header>

  <div class="vf-stage">
    <iframe class="vf-360" src="https://travvir.com/embed/W7Ojce" allow="fullscreen; xr-spatial-tracking; gyroscope; accelerometer" allowfullscreen title="Recorrido 360 de Casaducho"></iframe>
  </div>

  <a class="vf-reserve" id="vf-reserve" href="index.html#reservar" target="_self">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    <span>Reservar en TOI</span>
  </a>

  <script src="assets/js/toi-config.js"></script>
  <script>
    (function(){
      var T=(window.CASADUCHO_TOI||{}), btn=document.getElementById('vf-reserve');
      if(T.reserveUrl){ btn.href=T.reserveUrl; btn.target='_blank'; btn.rel='noopener noreferrer'; }
      else { btn.href='https://wa.me/'+(T.whatsappWaiter||'18495915955')+'?text='+encodeURIComponent('¡Hola! Quiero reservar en Casaducho'); btn.target='_blank'; btn.rel='noopener noreferrer'; }
    })();
  </script>
</body>
</html>
