<style>
  @font-face{font-family:'Bricolage';src:url('assets/fonts/bricolage.woff2') format('woff2');font-weight:400 800;font-display:swap}
  @font-face{font-family:'Druk Wide';src:url('assets/fonts/druk-heavy.woff2') format('woff2');font-weight:900;font-display:swap}
  @font-face{font-family:'Druk Wide';src:url('assets/fonts/druk-medium.woff2') format('woff2');font-weight:500;font-display:swap}
  :root{--crema:#fff3de;--crema2:#fbeccf;--papel:#fffaf0;--verde:#006838;--verde-noche:#06371f;--rosa:#ec008c;--amarillo:#ffde17;--tinta:#20140f;--suave:#6b5d50;
    --c-wagmi:#a8616c;--c-pecora:#3d5a5b;--c-hokkaido:#d6431a;--c-bar:#8f6238;--c-comedor:#b97607;--c-terraza:#2f7d52;
    --display:'Bricolage',-apple-system,system-ui,sans-serif;--druk:'Druk Wide','Bricolage',sans-serif;--sans:-apple-system,'Helvetica Neue',system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--crema);color:var(--tinta);-webkit-font-smoothing:antialiased;overflow:hidden}
  a{text-decoration:none;color:inherit}
  .vf-top{position:fixed;top:0;left:0;right:0;z-index:30;background:rgba(255,243,222,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(32,20,15,.08)}
  .vf-top-in{max-width:1280px;margin:0 auto;padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between}
  .vf-back{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:.85rem}
  .vf-back img{height:20px}
  .vf-title{font-family:var(--druk);font-weight:500;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--verde)}
  .vf-vp{position:fixed;inset:54px 0 0 0;overflow:hidden;background:#e9dcc0;touch-action:none;cursor:grab;overscroll-behavior:contain}
  .vf-vp:active{cursor:grabbing}
  .vf-inner{position:absolute;left:0;top:0;width:1208px;height:1000px;transform-origin:0 0;will-change:transform}
  .vf-inner svg{display:block;width:1208px;height:1000px}
  /* pins estilo maps */
  .vf-pin{position:absolute;transform:translate(-50%,-100%) scale(var(--inv,1));transform-origin:bottom center;cursor:pointer;z-index:5;border:0;background:none;padding:0}
  .vf-pin-body{display:flex;flex-direction:column;align-items:center;filter:drop-shadow(0 4px 6px rgba(0,0,0,.32))}
  .vf-pin-head{order:1;display:inline-flex;align-items:center;gap:6px;background:var(--pc,#fff);color:#fff;border-radius:999px;padding:6px 13px;font-family:var(--druk);font-weight:500;font-size:11px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
  .vf-pin-tip{order:2;width:0;height:0;border:7px solid transparent;border-top-color:var(--pc,#fff);margin-top:-1px}
  .vf-pin-dot{order:3;width:15px;height:6px;border-radius:50%;background:radial-gradient(closest-side,rgba(0,0,0,.42),rgba(0,0,0,0));margin-top:0px}
  .vf-pin.on .vf-pin-body{filter:drop-shadow(0 8px 11px rgba(0,0,0,.4));animation:vfpop .3s cubic-bezier(.22,1,.36,1)}
  .vf-pin.on .vf-pin-head{outline:3px solid #fff;box-shadow:0 0 0 5px rgba(255,255,255,.4)}
  @keyframes vfpop{0%{transform:scale(1)}42%{transform:scale(1.14)}100%{transform:scale(1)}}
  @media(hover:hover){.vf-pin:hover .vf-pin-head{filter:brightness(1.06)}}
  @media(prefers-reduced-motion:reduce){.vf-pin.on .vf-pin-body{animation:none}}
  /* controles */
  .vf-ctrl{position:fixed;right:14px;bottom:calc(40vh + 18px);z-index:25;display:flex;flex-direction:column;gap:8px}
  .vf-ctrl button{width:44px;height:44px;border:0;border-radius:13px;background:var(--papel);box-shadow:0 4px 12px rgba(32,20,15,.18);font-size:1.3rem;font-weight:700;color:var(--tinta);cursor:pointer;display:flex;align-items:center;justify-content:center}
  .vf-ctrl button:active{transform:scale(.95)}
  .vf-hint{position:fixed;top:66px;left:50%;transform:translateX(-50%);z-index:25;background:rgba(6,55,31,.9);color:var(--crema);font-family:var(--druk);font-weight:500;font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;padding:7px 14px;border-radius:999px;transition:opacity .4s;pointer-events:none}
  .vf-hint.gone{opacity:0}
  /* place card */
  .vf-card{position:fixed;left:0;right:0;bottom:0;z-index:28;background:var(--papel);border-radius:22px 22px 0 0;box-shadow:0 -10px 30px rgba(32,20,15,.2);transform:translateY(calc(100% + 40px));transition:transform .35s cubic-bezier(.22,1,.36,1);max-height:62vh;display:flex;flex-direction:column}
  .vf-card.up{transform:translateY(0)}
  @media(min-width:900px){ .vf-card{left:auto;right:18px;bottom:18px;width:392px;border-radius:20px;max-height:none} .vf-ctrl{bottom:18px} }
  .vf-card-photo{position:relative;height:236px;overflow:hidden;border-radius:22px 22px 0 0;background:#06371f;flex:0 0 auto;cursor:pointer}
  @media(max-height:760px){ .vf-card-photo{height:186px} }
  @media(max-height:640px){ .vf-card{max-height:70vh} .vf-card-photo{height:148px} }
  @media(min-width:900px){ .vf-card-photo{border-radius:20px 20px 0 0} }
  .vf-card-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s;transform:scale(1.06)}
  .vf-card-photo img.show{opacity:1;transform:scale(1);transition:opacity .4s,transform 7s ease}
  .vf-card-photo .soon{position:absolute;inset:0;display:none;align-items:center;justify-content:center;color:var(--crema);font-family:var(--druk);font-weight:500;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;text-align:center;padding:20px;background:linear-gradient(135deg,#06371f,#0c4a2c)}
  .vf-card-photo.soon .soon{display:flex}
  .vf-360chip{position:absolute;left:12px;bottom:12px;z-index:3;display:inline-flex;align-items:center;gap:6px;background:rgba(6,55,31,.82);color:var(--crema);font-family:var(--druk);font-weight:500;font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;padding:7px 12px;border-radius:999px;backdrop-filter:blur(4px)}
  .vf-360chip svg{width:13px;height:13px}
  .vf-card-x{position:absolute;top:10px;right:10px;z-index:4;width:32px;height:32px;border-radius:50%;border:0;background:rgba(255,250,240,.92);font-size:1.1rem;cursor:pointer;line-height:1}
  .vf-card-body{padding:15px 18px 20px}
  .vf-card-body .k{font-family:var(--druk);font-weight:500;font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;color:var(--verde)}
  .vf-card-body h2{font-family:var(--display);font-weight:800;font-size:1.4rem;margin:3px 0 6px}
  .vf-card-body p{color:var(--suave);font-size:.92rem;margin-bottom:14px;line-height:1.4}
  .vf-cta-row{display:flex;gap:10px}
  .vf-btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;height:48px;border-radius:999px;font-family:var(--druk);font-weight:500;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:0}
  .vf-btn.p{background:var(--rosa);color:#fff}
  .vf-btn.p svg{width:15px;height:15px}
  .vf-btn.g{background:transparent;color:var(--verde);border:1.6px solid rgba(0,104,56,.4)}
  .vf-btn:active{transform:scale(.97)}
  .vf-note{position:fixed;left:14px;bottom:14px;z-index:24;font-size:.62rem;color:var(--suave);background:rgba(255,243,222,.85);padding:6px 10px;border-radius:8px;max-width:62vw}
  @media(min-width:900px){ .vf-note{max-width:320px} }
</style>

    };
    /* ---------- pan / zoom ---------- */
    var vp=document.getElementById('vf-vp'), inner=document.getElementById('vf-inner');
    var IW=1208, IH=1000, st={x:0,y:0,s:1}, MIN=0.4, MAX=2.8;
    function clampS(s){return Math.max(MIN,Math.min(MAX,s));}
    function clamp(){
      var vw=vp.clientWidth, vh=vp.clientHeight, w=IW*st.s, h=IH*st.s, m=120;
      st.x=Math.min(m,Math.max(vw-w-m,st.x)); if(w<vw) st.x=(vw-w)/2;
      st.y=Math.min(m,Math.max(vh-h-m,st.y)); if(h<vh) st.y=(vh-h)/2;
    }
    function apply(){ inner.style.transform='translate('+st.x+'px,'+st.y+'px) scale('+st.s+')';
      var inv=1/st.s; document.querySelectorAll('.vf-pin').forEach(function(p){p.style.setProperty('--inv',inv);}); }
    function fit(){ var vw=vp.clientWidth,vh=vp.clientHeight; st.s=clampS(Math.min(vw/IW,vh/IH)*0.98); st.x=(vw-IW*st.s)/2; st.y=(vh-IH*st.s)/2; apply(); }
    function zoomAt(cx,cy,f){ var ns=clampS(st.s*f),k=ns/st.s; st.x=cx-(cx-st.x)*k; st.y=cy-(cy-st.y)*k; st.s=ns; clamp(); apply(); }
    var drag=null, pinch=null, pts={};
    vp.addEventListener('pointerdown',function(e){ pts[e.pointerId]={x:e.clientX,y:e.clientY};
      var k=Object.keys(pts); if(k.length===2){ var a=pts[k[0]],b=pts[k[1]]; pinch={d:Math.hypot(a.x-b.x,a.y-b.y),s:st.s}; drag=null; return; }
      drag={x:e.clientX,y:e.clientY,ox:st.x,oy:st.y,moved:false,t:Date.now(),tg:e.target}; try{vp.setPointerCapture(e.pointerId);}catch(_){}
    });
    vp.addEventListener('pointermove',function(e){
      if(pts[e.pointerId])pts[e.pointerId]={x:e.clientX,y:e.clientY};
      if(pinch){ var k=Object.keys(pts); if(k.length>=2){ var a=pts[k[0]],b=pts[k[1]],d=Math.hypot(a.x-b.x,a.y-b.y); var r=vp.getBoundingClientRect(); var cx=(a.x+b.x)/2-r.left, cy=(a.y+b.y)/2-r.top; var ns=clampS(pinch.s*(d/pinch.d)),kk=ns/st.s; st.x=cx-(cx-st.x)*kk; st.y=cy-(cy-st.y)*kk; st.s=ns; clamp(); apply(); } return; }
      if(!drag)return; var dx=e.clientX-drag.x,dy=e.clientY-drag.y; if(Math.hypot(dx,dy)>8)drag.moved=true; st.x=drag.ox+dx; st.y=drag.oy+dy; clamp(); apply();
    });
    function endPt(e){
      if(drag&&!drag.moved&&(Date.now()-drag.t)<500){ var pin=(e.target.closest&&e.target.closest('.vf-pin')); if(pin){ lastFocused=pin; select(pin.getAttribute('data-zone')); } }
      delete pts[e.pointerId]; if(Object.keys(pts).length<2)pinch=null; if(Object.keys(pts).length===0)drag=null;
    }
    vp.addEventListener('pointerup',endPt); vp.addEventListener('pointercancel',function(e){delete pts[e.pointerId];if(Object.keys(pts).length<2)pinch=null;drag=null;});
    vp.addEventListener('wheel',function(e){ e.preventDefault(); var r=vp.getBoundingClientRect(); zoomAt(e.clientX-r.left,e.clientY-r.top, e.deltaY<0?1.12:0.89); hideHint(); },{passive:false});
    function ctrZoom(f){ zoomAt(vp.clientWidth/2,vp.clientHeight/2,f); }
    document.getElementById('vf-zin').onclick=function(){ctrZoom(1.25);hideHint();};
    document.getElementById('vf-zout').onclick=function(){ctrZoom(0.8);hideHint();};
    document.getElementById('vf-home').onclick=function(){fit();hideHint();};
    var hint=document.getElementById('vf-hint'); function hideHint(){hint.classList.add('gone');}
    try{ if(localStorage.getItem('vf_seen')) hint.classList.add('gone'); else localStorage.setItem('vf_seen','1'); }catch(_){}
    vp.addEventListener('pointerdown',function(){setTimeout(hideHint,500);});
    /* ---------- place card ---------- */
    var card=document.getElementById('vf-card'), photo=document.getElementById('vf-photo');
    var imgA=document.getElementById('vf-img-a'), imgB=document.getElementById('vf-img-b');
    var nm=document.getElementById('vf-name'), de=document.getElementById('vf-desc'), chip=document.getElementById('vf-chip'), btn360t=document.getElementById('vf-360t');
    var fA=true, idx=0, timer=null, curZone=null, lastFocused=null;
    function paint(f){ var b=fA?imgB:imgA; b.src=IMG+f; b.onload=function(){ requestAnimationFrame(function(){ b.classList.add('show'); (fA?imgA:imgB).classList.remove('show'); fA=!fA; }); }; }
    function setBtn(has){ btn360t.textContent = has ? 'Ver en 360\u00b0' : 'Vista 360 \u00b7 pronto'; }
    function probe360(zone){
      var z=Z[zone]; if(!z||z._probed) return;
      if(z.has360){ z._probed=true; return; }
      var im=new Image();
      im.onload=function(){ z.has360=true; z._probed=true; if(curZone===zone){ setBtn(true); chip.style.display='inline-flex'; } };
      im.onerror=function(){ z._probed=true; };
      im.src=IMG360+zone+'.jpg';
    }
    function select(zone){
      var z=Z[zone]; if(!z)return; curZone=zone;
      document.querySelectorAll('.vf-pin').forEach(function(p){p.classList.toggle('on',p.getAttribute('data-zone')===zone);});
      nm.textContent=z.name; de.textContent=z.desc; idx=0; clearInterval(timer);
      setBtn(z.has360); chip.style.display = z.has360 ? 'inline-flex' : 'none'; probe360(zone);
      card.classList.add('up');
      try{ if(navigator.vibrate) navigator.vibrate(8); }catch(_){}
      if(!z.photos.length){ photo.classList.add('soon'); imgA.classList.remove('show'); imgB.classList.remove('show'); return; }
      photo.classList.remove('soon'); paint(z.photos[0]);
      if(z.photos.length>1){ timer=setInterval(function(){ idx=(idx+1)%z.photos.length; paint(z.photos[idx]); },4200); }
    }
    function closeCard(){ card.classList.remove('up'); document.querySelectorAll('.vf-pin').forEach(function(p){p.classList.remove('on');}); clearInterval(timer); curZone=null; }
    document.getElementById('vf-x').onclick=closeCard;
    /* ---------- 360 ---------- */
    function openPano(zone){
      var z=Z[zone]; if(!z||!window.Pano360)return;
      var img = z.has360 ? (IMG360+zone+'.jpg') : null;
      var fb  = (z.photos&&z.photos.length) ? (IMG+z.photos[0]) : '';
      try{ history.pushState({pano:zone},''); }catch(_){}
      window.Pano360.open({ image:img, fallbackImage:fb, label:z.name, onClose:onPanoClose });
    }
    function onPanoClose(){
      if(history.state && history.state.pano){ try{ history.back(); }catch(_){} }
      if(lastFocused && lastFocused.focus){ try{ lastFocused.focus(); }catch(_){} }
    }
    window.addEventListener('popstate',function(){ if(window.Pano360) window.Pano360.close(); });
    document.getElementById('vf-360').onclick=function(){ if(curZone) openPano(curZone); };
    photo.addEventListener('click',function(e){ if(e.target.closest('#vf-x'))return; if(curZone) openPano(curZone); });
    window.addEventListener('resize',fit);
    window.addEventListener('orientationchange',function(){ setTimeout(fit,250); });
    fit();
  })();
  </script>
</body>
</html>
